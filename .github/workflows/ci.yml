name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend Lint Type Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: school_admin
          POSTGRES_PASSWORD: change_me
          POSTGRES_DB: school_management_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U school_admin -d school_management_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      LOG_LEVEL: INFO
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: school_management_test
      POSTGRES_USER: school_admin
      POSTGRES_PASSWORD: change_me
      JWT_SECRET_KEY: ci_test_secret
      TEST_DATABASE_URL: postgresql+psycopg://school_admin:change_me@localhost:5432/school_management_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint backend
        run: make backend-lint

      - name: Typecheck backend
        run: make backend-typecheck

      - name: Run backend unit tests
        run: make backend-test-unit

      - name: Run backend integration tests
        run: make backend-test-integration

  frontend:
    name: Frontend Lint Type Test Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend
        run: make frontend-lint

      - name: Typecheck frontend
        run: make frontend-typecheck

      - name: Run frontend unit/component tests
        run: make frontend-test

      - name: Build frontend
        run: make frontend-build

  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Playwright Browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: make frontend-e2e
